<h2>Album #{{ albumId }} — Photos</h2>

<div *ngIf="loading" class="info">Loading photos...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<div *ngIf="!loading && photos.length === 0 && !error" class="info">No photos.</div>

<div class="grid" *ngIf="!loading && photos.length > 0">
  <div class="photo" *ngFor="let p of photos">
    <img [src]="p.thumbnailUrl" [alt]="p.title" (error)="p.thumbnailUrl = 'https://placehold.co/150'" />
    <div class="caption">{{ p.title }}</div>
  </div>
</div>

<button class="btn" (click)="goBack()">Back</button>
